name: Dev tests

on:
  push:
    branches: [dev]

jobs:
  cpp-tests:
    name: C++ tests (Linux, GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            gcc \
            g++

      - name: Configure
        run: cmake --preset linux-gcc-dev -DSIRIUS_ENABLE_PYTHON_BINDINGS=OFF

      - name: Build
        run: cmake --build --preset linux-gcc-dev

      - name: Test
        run: ctest --preset linux-gcc-dev

  python-tests:
    name: Python binding tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            gcc \
            g++

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python build/test deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Build & install sirius (editable)
        run: pip install -e . --verbose

      - name: Run python tests
        run: python -m unittest discover -s bindings/tests -v
